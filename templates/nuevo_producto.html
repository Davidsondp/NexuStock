<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Producto - NexuStock</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="bg-blue-600 text-white p-4 shadow">

        <div class="flex justify-between items-center">

            <h1 class="text-2xl font-bold">
                📦 NexuStock
            </h1>

            <div class="space-x-6">

                <a href="/dashboard">Dashboard</a>
                <a href="/productos">Productos</a>
                <a href="/movimientos">Movimientos</a>
                <a href="/reportes">Reportes</a>

            </div>

        </div>

    </div>

    <div class="max-w-3xl mx-auto mt-8 bg-white p-8 rounded-xl shadow">

        <h2 class="text-3xl font-bold mb-6">
            ➕ Nuevo Producto
        </h2>

        <form method="POST">

            <div class="mb-4">
                <label class="block mb-2">
                    Código Interno
                </label>

                <input
                    type="text"
                    name="codigo"
                    class="w-full border rounded-lg px-4 py-3"
                    required
                >
            </div>

            <div class="mb-4">
                <label class="block mb-2">
                    Código de Barras / QR
                </label>

                <input
                    type="text"
                    name="codigo_barras"
                    class="w-full border rounded-lg px-4 py-3"
                    placeholder="Ej: 7801234567890"
                >
            </div>

            <div class="mb-4">
                <label class="block mb-2">
                    Nombre
                </label>

                <input
                    type="text"
                    name="nombre"
                    class="w-full border rounded-lg px-4 py-3"
                    required
                >
            </div>

            <div class="mb-4">
                <label class="block mb-2">
                    Categoría
                </label>

                <input
                    type="text"
                    name="categoria"
                    class="w-full border rounded-lg px-4 py-3"
                >
            </div>

            <div class="mb-4">
                <label class="block mb-2">
                    Stock Inicial
                </label>

                <input
                    type="number"
                    name="stock"
                    value="0"
                    class="w-full border rounded-lg px-4 py-3"
                >
            </div>

            <div class="mb-4">
                <label class="block mb-2">
                    Stock Mínimo
                </label>

                <input
                    type="number"
                    name="stock_minimo"
                    value="0"
                    class="w-full border rounded-lg px-4 py-3"
                >
            </div>

            <div class="mb-4">
                <label class="block mb-2">
                    Precio
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="precio"
                    value="0"
                    class="w-full border rounded-lg px-4 py-3"
                >
            </div>

            <div class="mb-4">
                <label class="block mb-2">
                    Unidades por Caja
                </label>

                <input
                    type="number"
                    name="unidades_por_caja"
                    value="1"
                    min="1"
                    class="w-full border rounded-lg px-4 py-3"
                >
            </div>

            <div class="mb-6">
                <label class="block mb-2">
                    Descripción
                </label>

                <textarea
                    name="descripcion"
                    rows="4"
                    class="w-full border rounded-lg px-4 py-3"
                ></textarea>
            </div>

            <div class="flex gap-3">

                <button
                    type="submit"
                    class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700"
                >
                    Guardar Producto
                </button>

                <a
                    href="/productos"
                    class="bg-gray-500 text-white px-6 py-3 rounded-lg hover:bg-gray-600"
                >
                    Cancelar
                </a>

            </div>

        </form>

    </div>

</body>

</html>
