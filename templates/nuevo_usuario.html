<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Usuario - NexuStock</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="bg-blue-600 text-white p-4 shadow">

        <div class="flex justify-between items-center">

            <h1 class="text-2xl font-bold">
                📦 NexuStock
            </h1>

            <div class="space-x-6">

                <a href="/dashboard">Dashboard</a>
                <a href="/productos">Productos</a>
                <a href="/usuarios">Usuarios</a>

            </div>

        </div>

    </div>

    <div class="max-w-3xl mx-auto mt-8 bg-white p-8 rounded-xl shadow">

        <h2 class="text-3xl font-bold mb-6">
            👤 Nuevo Usuario
        </h2>

        <form method="POST">

            <div class="mb-4">

                <label class="block mb-2">
                    Nombre
                </label>

                <input
                    type="text"
                    name="nombre"
                    required
                    class="w-full border rounded-lg px-4 py-3"
                >

            </div>

            <div class="mb-4">

                <label class="block mb-2">
                    Correo
                </label>

                <input
                    type="email"
                    name="email"
                    required
                    class="w-full border rounded-lg px-4 py-3"
                >

            </div>

            <div class="mb-4">

                <label class="block mb-2">
                    Contraseña
                </label>

                <input
                    type="password"
                    name="password"
                    required
                    class="w-full border rounded-lg px-4 py-3"
                >

            </div>

            <div class="mb-6">

                <label class="block mb-2">
                    Rol
                </label>

                <select
                    name="rol"
                    class="w-full border rounded-lg px-4 py-3"
                >

                    <option value="empleado">
                        Empleado
                    </option>

                    <option value="admin">
                        Administrador
                    </option>

                </select>

            </div>

            <button
                type="submit"
                class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700"
            >
                Guardar Usuario
            </button>

        </form>

    </div>

</body>
</html>
